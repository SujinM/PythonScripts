services:
  frontend:
    build: .
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://backend:8000
      - VITE_MOCK_DATA=false
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ../BackendFastAPI
    ports:
      - "8000:8000"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
