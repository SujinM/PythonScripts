[pytest]
# -----------------------------------------------------------------------
# pytest configuration for plc_ads_project
# -----------------------------------------------------------------------

# Test discovery
testpaths       = tests
python_files    = test_*.py
python_classes  = Test*
python_functions= test_*

# Output verbosity
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Markers used in the test suite
markers =
    integration: marks tests that require a real PLC connection (deselect with -m "not integration")
    slow: marks tests that take significant time to run

# Minimum pytest version required
minversion = 8.0
